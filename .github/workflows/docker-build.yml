name: Docker Build

on:
  pull_request:
    paths:
      - "docker/**"
      - "tools/ci/check_docker_build.sh"
      - "tools/ci/container_runtime.py"
      - "tools/ci/run_container_pack.py"
      - ".github/workflows/docker-build.yml"
      - "Makefile"
  push:
    branches: [ main, master ]
    paths:
      - "docker/**"
      - "tools/ci/check_docker_build.sh"
      - "tools/ci/container_runtime.py"
      - "tools/ci/run_container_pack.py"
      - ".github/workflows/docker-build.yml"
      - "Makefile"
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run default Docker pack check
        run: bash tools/ci/check_docker_build.sh --pack docker/packs/default.toml --pull --tag project-template:ci-default

      - name: Run host-docker Docker pack check
        run: bash tools/ci/check_docker_build.sh --pack docker/packs/default-host-docker.toml --pull --tag project-template:ci-host-docker

# @dependency-start
# responsibility Defines docker build YAML configuration.
# upstream environment ../../docker/README.md docker runtime contract
# upstream implementation ../../docker/check_build.sh submodule-free docker build validation
# @dependency-end
name: Docker Build

on:
  pull_request:
    paths:
      - "docker/**"
      - ".dockerignore"
      - ".devcontainer/**"
      - ".github/workflows/docker-build.yml"
      - "Makefile"
  push:
    branches: [ main, master ]
    paths:
      - "docker/**"
      - ".dockerignore"
      - ".devcontainer/**"
      - ".github/workflows/docker-build.yml"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Docker Pack Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false

      - name: Run default Docker pack check
        run: bash docker/check_build.sh --pack docker/packs/default.toml --pull --tag project-template:ci-default

      - name: Run host-docker Docker pack check
        run: bash docker/check_build.sh --pack docker/packs/default-host-docker.toml --pull --tag project-template:ci-host-docker

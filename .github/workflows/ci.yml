# @dependency-start
# responsibility Defines ci YAML configuration.
# upstream implementation ../../tools/ci/run_all_checks.sh repository CI entrypoint
# upstream implementation ../../Makefile ci target contract
# @dependency-end
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-ci:
    name: Repository CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - name: Checkout repository with AgentCanon
        uses: actions/checkout@v4
        with:
          submodules: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docker/requirements.txt

      - name: Run repository CI
        run: make ci

  agent-canon-pr:
    name: AgentCanon PR Gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - name: Checkout repository with AgentCanon
        uses: actions/checkout@v4
        with:
          submodules: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docker/requirements.txt

      - name: Run shared canon PR gate
        run: make agent-canon-pr-check

  fresh-clone-acceptance:
    name: Fresh Clone Acceptance
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - name: Checkout repository with AgentCanon
        uses: actions/checkout@v4
        with:
          submodules: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docker/requirements.txt

      - name: Run fresh clone acceptance
        run: make fresh-clone-check

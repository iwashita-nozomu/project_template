# @dependency-start
# responsibility Runs repository CI with explicit AgentCanon submodule checkout.
# upstream implementation ../scripts/checkout_agent_canon_submodule.sh checks out shared AgentCanon paths.
# upstream implementation ../../docker/requirements.txt declares CI Python dependencies.
# downstream implementation ../../Makefile provides CI command targets.
# @dependency-end
name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
      AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false

      - name: Checkout AgentCanon submodule
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install pip dependencies
        run: |
          bash docker/install_python_dependencies.sh "$PWD"

      - name: Run repository CI
        run: make ci

  agent-canon-pr:
    runs-on: ubuntu-latest
    env:
      AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
      AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false

      - name: Checkout AgentCanon submodule
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install pip dependencies
        run: |
          bash docker/install_python_dependencies.sh "$PWD"

      - name: Run shared canon PR gate
        run: make agent-canon-pr-check

  fresh-clone-acceptance:
    runs-on: ubuntu-latest
    env:
      AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
      AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false

      - name: Checkout AgentCanon submodule
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install pip dependencies
        run: |
          bash docker/install_python_dependencies.sh "$PWD"

      - name: Run fresh clone acceptance
        run: make fresh-clone-check

name: "Week 1: Security Foundation"

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "scripts/audit/**"
      - "scripts/security/**"
      - "tests/test_week1_security.py"
      - "docker/requirements.txt"
      - ".github/workflows/week1-security.yml"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: week1-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONPATH: /workspace/python
  AUDIT_LOG_DIR: /workspace/reports/audit
  RBAC_CONFIG_DIR: /workspace/scripts/security
  SECRETS_VAULT_DIR: /workspace/scripts/security/vault

jobs:
  # ========== Security Foundation Checks ==========
  
  security-foundation:
    name: "Security Foundation Checks"
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      
      - name: "Set up Python"
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: "Install dependencies"
        run: |
          python3 -m pip install --upgrade pip
          pip install -r docker/requirements.txt
      
      - name: "Verify Audit Logger"
        run: |
          python3 << 'EOF'
          import sys
          sys.path.insert(0, 'scripts')
          from audit.audit_logger import AuditLogger, AuditLevel
          logger = AuditLogger()
          entry = logger.log(
              action="ci_test",
              actor="github-actions",
              level=AuditLevel.INFO,
              details={"job": "security-foundation"}
          )
          print(f"✅ Audit logger test: {entry['action']}")
          EOF
      
      - name: "Verify RBAC Manager"
        run: |
          python3 << 'EOF'
          import sys
          sys.path.insert(0, 'scripts')
          from security.rbac_manager import RBACManager
          manager = RBACManager()
          manager.add_user("ci_user", ["developer"])
          perms = manager.get_permissions("ci_user", "skill")
          assert "execute" in perms
          print(f"✅ RBAC manager test: {len(manager.users)} users")
          EOF
      
      - name: "Verify Secrets Vault"
        run: |
          python3 << 'EOF'
          import sys
          sys.path.insert(0, 'scripts')
          from security.secrets_vault import SecretsVault
          vault = SecretsVault()
          vault.set_secret("test_key", "test_value", secret_type="token")
          secret = vault.get_secret("test_key")
          assert secret is not None
          print(f"✅ Secrets vault test: {len(vault.secrets)} secrets")
          EOF
      
      - name: "Verify Audit Log Schema"
        run: |
          python3 << 'EOF'
          import sys
          sys.path.insert(0, 'scripts')
          from audit.audit_log_schema import AuditLogEntry, validate_entry
          from datetime import datetime
          entry = AuditLogEntry(
              timestamp=datetime.utcnow().isoformat() + "Z",
              action="test",
              actor="test",
              level="INFO",
              outcome="success",
              git_commit="abc123",
              branch="main"
          )
          is_valid, error = validate_entry(entry.to_dict())
          assert is_valid
          print(f"✅ Schema validation test: valid={is_valid}")
          EOF
  
  # ========== Integration Tests ==========
  
  integration-tests:
    name: "Week 1 Integration Tests"
    runs-on: ubuntu-latest
    needs: security-foundation
    
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      
      - name: "Set up Python"
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: "Install dependencies"
        run: |
          python3 -m pip install --upgrade pip
          pip install -r docker/requirements.txt
      
      - name: "Run Week 1 Security Tests"
        run: |
          python3 scripts/run_week1_tests.py --verbose
      
      - name: "Display Audit Logs"
        if: always()
        run: |
          python3 << 'EOF'
          import sys
          import json
          from pathlib import Path
          sys.path.insert(0, 'scripts')
          from audit.audit_logger import AuditLogger
          logger = AuditLogger()
          stats = logger.get_statistics()
          print("\n📊 Audit Log Statistics:")
          print(json.dumps(stats, indent=2, ensure_ascii=False))
          EOF
      
      - name: "Display RBAC Configuration"
        if: always()
        run: |
          python3 << 'EOF'
          import sys
          import json
          sys.path.insert(0, 'scripts')
          from security.rbac_manager import RBACManager
          manager = RBACManager()
          config = manager.export_config()
          print("\n🔐 RBAC Configuration:")
          print(f"Users: {len(config['users'])}")
          print(f"Roles: {len(config['roles'])}")
          for role, data in config['roles'].items():
              print(f"  - {role}: {list(data['permissions'].keys())}")
          EOF
      
      - name: "Display Secrets Vault Status"
        if: always()
        run: |
          python3 << 'EOF'
          import sys
          import json
          sys.path.insert(0, 'scripts')
          from security.secrets_vault import SecretsVault
          vault = SecretsVault()
          stats = vault.validate_secrets()
          print("\n🔑 Secrets Vault Status:")
          print(json.dumps(stats, indent=2, ensure_ascii=False))
          EOF
  
  # ========== Static Type Checking ==========
  
  type-check:
    name: "Static Type Checking"
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      
      - name: "Set up Python"
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: "Install dependencies"
        run: |
          pip install -r docker/requirements.txt
      
      - name: "Run Pyright on Security Modules"
        continue-on-error: true
        run: |
          pyright scripts/audit/audit_logger.py scripts/audit/audit_log_schema.py
          pyright scripts/security/rbac_manager.py scripts/security/secrets_vault.py
  
  # ========== Linting ==========
  
  lint:
    name: "Code Quality (Linting)"
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      
      - name: "Set up Python"
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: "Install dependencies"
        run: |
          pip install ruff
      
      - name: "Run Ruff on Security Modules"
        continue-on-error: true
        run: |
          ruff check scripts/audit/ scripts/security/ tests/test_week1_security.py
      
      - name: "Run Ruff format check"
        continue-on-error: true
        run: |
          ruff format --check scripts/audit/ scripts/security/

  # ========== Coverage Report ==========
  
  coverage:
    name: "Code Coverage"
    runs-on: ubuntu-latest
    needs: integration-tests
    
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      
      - name: "Set up Python"
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: "Install dependencies"
        run: |
          pip install pytest pytest-cov coverage
          pip install -r docker/requirements.txt
      
      - name: "Run tests with coverage"
        run: |
          pytest tests/test_week1_security.py \
            --cov=scripts/audit \
            --cov=scripts/security \
            --cov-report=term-missing \
            --cov-report=html:reports/coverage-week1
      
      - name: "Upload coverage report"
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-week1
          path: reports/coverage-week1
  
  # ========== Final Status ==========
  
  week1-status:
    name: "Week 1 Status Report"
    runs-on: ubuntu-latest
    needs: [security-foundation, integration-tests, type-check, lint]
    if: always()
    
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      
      - name: "Generate Status Report"
        run: |
          echo "## 📋 Week 1 Security Foundation Report"
          echo ""
          echo "### Components:"
          echo "- ✅ Audit Logger (`scripts/audit/audit_logger.py`)"
          echo "- ✅ Audit Log Schema (`scripts/audit/audit_log_schema.py`)"
          echo "- ✅ RBAC Manager (`scripts/security/rbac_manager.py`)"
          echo "- ✅ Secrets Vault (`scripts/security/secrets_vault.py`)"
          echo ""
          echo "### Jobs Status:"
          echo "- Security Foundation: ${{ job.security-foundation.status }}"
          echo "- Integration Tests: ${{ needs.integration-tests.result }}"
          echo "- Type Check: ${{ needs.type-check.result }}"
          echo "- Lint: ${{ needs.lint.result }}"
      
      - name: "Report Status"
        if: |
          needs.security-foundation.result == 'success' &&
          needs.integration-tests.result == 'success'
        run: |
          echo "✅ Week 1 Security Foundation: READY"
      
      - name: "Report Failure"
        if: |
          needs.security-foundation.result != 'success' ||
          needs.integration-tests.result != 'success'
        run: |
          echo "❌ Week 1 Security Foundation: FAILED"
          exit 1

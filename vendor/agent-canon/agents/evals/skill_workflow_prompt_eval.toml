[[evals]]
id = "adaptive-improvement-loop-skill-shim"
target = ".agents/skills/adaptive-improvement-loop/SKILL.md"
kind = "skill"
description = "The discoverable Codex skill must route iterative improvement through goal.md and prompt evals."

[[evals.checklist]]
id = "AIL-SHIM-1"
critical = true
description = "Mentions the top-level goal contract and goal loop tool."
required_regex = ["goal\\.md", "goal_loop\\.py"]

[[evals.checklist]]
id = "AIL-SHIM-2"
critical = true
description = "Requires frozen eval definitions before prompt or workflow tuning."
required_regex = ["agents/evals/skill_workflow_prompt_eval\\.toml", "evaluate_skill_workflow_prompts\\.py"]

[[evals.checklist]]
id = "AIL-SHIM-3"
critical = true
description = "Blocks loop closeout while eval drift remains."
required_regex = ["Do not close", "eval"]

[[evals.checklist]]
id = "AIL-SHIM-4"
critical = true
description = "Requires behavior-event monitoring and agent behavior eval before closeout."
required_regex = ["workflow_monitor\\.py", "behavior-event", "agent_behavior_eval\\.toml", "evaluate_agent_run\\.py"]

[[evals.checklist]]
id = "AIL-SHIM-5"
critical = true
description = "Uses MCP goal.loop_status as the mechanical iteration gate."
required_regex = ["goal\\.loop_status", "NEXT_ACTION=run_next_iteration"]

[[evals]]
id = "adaptive-improvement-loop-human-skill"
target = "agents/skills/adaptive-improvement-loop.md"
kind = "skill"
description = "The human skill canon must explain eval-driven prompt repair for iterative loops."

[[evals.checklist]]
id = "AIL-HUMAN-1"
critical = true
description = "Requires goal.md and goal_loop.py for repo-level loops."
required_regex = ["goal\\.md", "goal_loop\\.py"]

[[evals.checklist]]
id = "AIL-HUMAN-2"
critical = true
description = "Requires an eval per tested skill and workflow."
required_regex = ["skill/workflow", "eval"]

[[evals.checklist]]
id = "AIL-HUMAN-3"
critical = true
description = "Requires prompt repair and rerun until no eval deviation remains."
required_regex = ["prompt", "rerun", "no eval deviation"]

[[evals.checklist]]
id = "AIL-HUMAN-4"
critical = true
description = "Requires behavior-event capture and behavior eval repair for agent behavior tuning."
required_regex = ["workflow_monitor\\.py", "behavior-event", "agent_behavior_eval\\.toml", "AGENT_EVALUATION_STATUS=pass"]

[[evals.checklist]]
id = "AIL-HUMAN-5"
critical = true
description = "Requires MCP goal.loop_status to keep iterations mechanical."
required_regex = ["goal\\.loop_status", "NEXT_ACTION=run_next_iteration", "MCP Goal Loop Status"]

[[evals]]
id = "adaptive-improvement-workflow"
target = "agents/workflows/adaptive-improvement-workflow.md"
kind = "workflow"
description = "The workflow must make eval definition, measurement, prompt repair, and rerun a first-class loop stage."

[[evals.checklist]]
id = "AIL-WF-1"
critical = true
description = "Defines evals before choosing or changing an iteration."
required_regex = ["skill/workflow eval", "agents/evals/skill_workflow_prompt_eval\\.toml"]

[[evals.checklist]]
id = "AIL-WF-2"
critical = true
description = "Runs the mechanical eval tool and uses its report as evidence."
required_regex = ["evaluate_skill_workflow_prompts\\.py", "EVAL_STATUS=pass"]

[[evals.checklist]]
id = "AIL-WF-3"
critical = true
description = "Repairs prompts and reruns the same eval until drift is gone."
required_regex = ["prompt repair", "rerun", "eval drift"]

[[evals.checklist]]
id = "AIL-WF-4"
critical = true
description = "Repairs behavior eval feedback and reruns until agent behavior monitoring passes."
required_regex = ["agent_behavior_eval\\.toml", "workflow_monitor\\.py --behavior-event", "AGENT_EVALUATION_STATUS=pass"]

[[evals.checklist]]
id = "AIL-WF-5"
critical = true
description = "Requires MCP goal.loop_status to decide whether to continue or close."
required_regex = ["goal\\.loop_status", "NEXT_ACTION=run_next_iteration", "NEXT_ACTION=close_goal_loop"]

[[evals.checklist]]
id = "AIL-WF-6"
critical = true
description = "Treats Codex goals as a session view, not the durable goal source."
required_regex = ["Codex `goals`", "goal\\.md", "session view"]

[[evals]]
id = "codex-goals-workflow"

description = "The Codex goals workflow must bind the feature to goal.md and MCP loop status."

[[evals.checklist]]
id = "CODEX-GOALS-1"
critical = true
description = "Defines the role split between goal.md, Codex goals, MCP, and goal_loop.py."
required_regex = ["goal\\.md", "Codex `goals`", "goal\\.loop_status", "goal_loop\\.py", "repo-local state", "vendor/agent-canon/goal\\.md"]

[[evals.checklist]]
id = "CODEX-GOALS-2"
critical = true
description = "Requires feature and MCP preflight commands."
required_regex = ["codex features list", "check_mcp_inventory\\.py", "goal_loop\\.py status"]

[[evals.checklist]]
id = "CODEX-GOALS-3"
critical = true
description = "Blocks closeout while MCP or goal.md says to continue."
required_regex = ["NEXT_ACTION=run_next_iteration", "NEXT_ACTION=close_goal_loop", "not complete"]

[[evals.checklist]]
id = "CODEX-GOALS-4"
critical = true
description = "Requires goal-specified tasks to enter Plan mode before implementation."

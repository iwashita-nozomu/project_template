  - id: adaptive_improvement_loop
    name: Adaptive Improvement Loop
    roles:
      always_on:
        - manager
        - manager_reviewer
        - designer
        - design_reviewer
        - document_flow_reviewer
        - implementer
        - change_reviewer
        - final_reviewer
        - verifier
        - auditor

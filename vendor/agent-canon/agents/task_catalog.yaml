version: 2

workflow_families:
  - id: scoped_change
    name: Scoped Change
    roles:
      always_on:
        - manager
        - manager_reviewer
        - designer
        - design_reviewer
        - document_flow_reviewer
        - implementer
        - change_reviewer
        - final_reviewer
        - verifier
        - auditor
      specialists:
        - scheduler
        - schedule_reviewer
        - docs_workflow_steward
        - test_designer
        - python_reviewer
        - cpp_reviewer
    tasks:
      - T1
      - T2
      - T3

  - id: research_driven_change
    name: Research-Driven Change
    roles:
      always_on:
        - manager
        - manager_reviewer
        - designer
        - design_reviewer
        - document_flow_reviewer
        - implementer
        - change_reviewer
        - final_reviewer
        - verifier
        - auditor
      specialists:
        - researcher
        - research_reviewer
        - scheduler
        - schedule_reviewer
        - report_reviewer
        - citation_evidence_reviewer
        - test_designer
        - python_reviewer
        - cpp_reviewer
        - notation_definition_reviewer
        - logic_gap_reviewer
        - experimenter
        - experiment_reviewer
        - reproducibility_reviewer
        - scientific_computing_reviewer
        - benchmark_reviewer
        - artifact_reviewer
        - fair_data_reviewer
        - ml_science_reviewer
    tasks:
      - T4
      - T5
      - T9
      - T10

  - id: large_delivery
    name: Large Delivery
    roles:
      always_on:

tasks:
  - id: T1
    name: local bug fix
    family: scoped_change
    specialists:
      - scheduler
      - schedule_reviewer
      - test_designer
      - python_reviewer
  - id: T2
    name: CI or flaky test fix
    family: scoped_change
    specialists:
      - scheduler
      - schedule_reviewer
      - test_designer
      - python_reviewer
  - id: T3
    name: docs and test sync
    family: scoped_change
    specialists:
      - scheduler
      - schedule_reviewer
      - docs_workflow_steward
      - test_designer
      - python_reviewer
  - id: T4
    name: research-backed implementation change
    family: research_driven_change
    specialists:
      - researcher
      - research_reviewer
      - scheduler
      - schedule_reviewer
      - experimenter
      - experiment_reviewer
      - report_reviewer
      - test_designer
      - python_reviewer
  - id: T5
    name: benchmark or experiment-driven optimization
    family: research_driven_change
    specialists:
      - researcher
      - research_reviewer
      - scheduler
      - schedule_reviewer
      - experimenter
      - experiment_reviewer
      - report_reviewer
      - test_designer
      - python_reviewer
  - id: T6
    name: large refactor
    family: large_delivery
    specialists:
      - scheduler
      - schedule_reviewer
      - test_designer
      - python_reviewer
  - id: T7
    name: new feature or API delivery
    family: large_delivery
    specialists:
      - scheduler
      - schedule_reviewer
      - test_designer
      - python_reviewer
  - id: T8
    name: environment, CI, Docker, or dependency update
    family: platform_and_environment
    specialists:
      - infra_steward
      - infra_reviewer
      - scheduler
      - schedule_reviewer
      - docs_workflow_steward
      - test_designer
      - python_reviewer
  - id: T9
    name: research workflow, artifact policy, or reporting policy change
    family: research_driven_change
    specialists:
      - scheduler
      - schedule_reviewer
      - researcher
      - research_reviewer
      - experimenter
      - experiment_reviewer
      - report_reviewer
      - reproducibility_reviewer
      - scientific_computing_reviewer
      - benchmark_reviewer
      - artifact_reviewer
      - fair_data_reviewer
      - ml_science_reviewer
  - id: T10
    name: academic paper, thesis chapter, or scholarly note
    family: research_driven_change
    specialists:
      - scheduler
      - schedule_reviewer
      - researcher
      - research_reviewer
      - report_reviewer
      - citation_evidence_reviewer
      - notation_definition_reviewer
      - logic_gap_reviewer
  - id: T11
    name: repo-wide integrated delivery across code docs tools and runtime
    family: comprehensive_development
    specialists:
      - scheduler
      - schedule_reviewer
      - critical_guardian
      - project_reviewer
      - docs_workflow_steward
      - test_designer
      - python_reviewer
      - infra_steward
      - infra_reviewer
  - id: T12
    name: agent workflow tooling or canon rearchitecture
    family: comprehensive_development
    specialists:
      - scheduler
      - schedule_reviewer
      - critical_guardian
      - project_reviewer
      - docs_workflow_steward
      - test_designer
      - python_reviewer
      - researcher
      - research_reviewer
      - infra_steward
      - infra_reviewer
  - id: T13
    name: adaptive tuning exploration and experiment-driven improvement loop
    family: adaptive_improvement_loop
    specialists:
      - researcher
      - research_reviewer
      - scheduler
      - schedule_reviewer
      - experimenter
      - experiment_reviewer
      - report_reviewer
      - test_designer
      - python_reviewer
      - reproducibility_reviewer
      - scientific_computing_reviewer
      - benchmark_reviewer
      - artifact_reviewer
      - fair_data_reviewer
      - ml_science_reviewer

review_packs:
  - id: research_perspective_review
    name: Research Perspective Review
    specialists:
      - reproducibility_reviewer
      - scientific_computing_reviewer
      - benchmark_reviewer
      - artifact_reviewer
      - fair_data_reviewer
      - ml_science_reviewer
    default_for_tasks:
      - T4
      - T5
      - T9
      - T13
    when: methodology, artifact policy, benchmark protocol, or reporting policy changes substantially
  - id: academic_writing_review
    name: Academic Writing Review
    specialists:
      - citation_evidence_reviewer
      - notation_definition_reviewer
      - logic_gap_reviewer
    default_for_tasks:
      - T10
    optional_for_tasks:
      - T4
      - T5
      - T9
    when: paper-like writing, thesis prose, symbol-dense text, or claim-heavy academic exposition needs separate citation/evidence, notation, and logic review
  - id: repo_integration_review
    name: Repo Integration Review
    specialists:
      - project_reviewer
      - docs_workflow_steward
      - python_reviewer
    default_for_tasks:
      - T11
      - T12
    optional_for_tasks:
      - T3
      - T6
      - T7
      - T8
    when: repo-wide delivery needs integration review across code, docs, workflow, and runtime surfaces

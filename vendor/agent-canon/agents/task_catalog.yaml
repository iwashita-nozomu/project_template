        - scheduler
        - schedule_reviewer
        - test_designer
        - python_reviewer
        - cpp_reviewer
    tasks:
      - T6
      - T7

  - id: platform_and_environment
    name: Platform And Environment
    roles:
      always_on:
        - manager
        - manager_reviewer
        - designer
        - design_reviewer
        - document_flow_reviewer
        - implementer
        - change_reviewer
        - final_reviewer
        - verifier
        - auditor

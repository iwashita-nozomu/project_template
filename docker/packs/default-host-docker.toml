# @dependency-start
# responsibility Defines the Docker runtime pack that mounts the host Docker socket.
# upstream implementation ../Dockerfile builds the project runtime image.
# downstream implementation ../../tools/ci/check_docker_build.sh validates this pack.
# downstream implementation ../../tools/ci/run_container_pack.py renders build and smoke commands.
# @dependency-end

[pack]
name = "default-host-docker"
dockerfile = "docker/Dockerfile"
context = "."
image_tag = "docomo_bt_management:default-runtime-pack-host-docker"

[smoke]
shell = "/bin/bash"
commands = [
  "python3 --version",
  "docker version",
]

[runtime]
shell = "/bin/bash"
workdir = "/workspace"
workspace_mount = "/workspace"
env = [
  "PYTHONPATH=/workspace/python",
]
mounts = [
  "/var/run/docker.sock:/var/run/docker.sock",
]

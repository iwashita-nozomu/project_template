[pack]
name = "default-host-docker"
dockerfile = "docker/Dockerfile"
context = "."
image_tag = "project-template:default-runtime-pack-host-docker"

[smoke]
shell = "/bin/bash"
commands = [
  "python3 --version",
  "docker version",
]

[runtime]
shell = "/bin/bash"
workdir = "/workspace"
workspace_mount = "/workspace"
env = [
  "AUTO_GIT_SAFE_DIRECTORY=1",
]
mounts = [
  "/var/run/docker.sock:/var/run/docker.sock",
]

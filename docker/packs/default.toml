# @dependency-start
# responsibility Defines the default Docker runtime pack and smoke commands.
# upstream implementation ../Dockerfile builds the project runtime image.
# upstream implementation ../install_python_dependencies.sh installs workspace-mounted Python dependencies.
# upstream implementation ../register_safe_directories.sh registers mounted Git safe directories.
# downstream implementation ../../.github/workflows/docker-build.yml runs this pack in CI.
# @dependency-end

[pack]
name = "default"
dockerfile = "docker/Dockerfile"
context = "."
image_tag = "docomo_bt_management:default-runtime-pack"

[smoke]
shell = "/bin/bash"
commands = [
  "python3 --version",
  "python3 -m pip --version",
  "cmake --version",
  "ninja --version",
  "docker --version",
  "bash docker/register_safe_directories.sh /workspace",
  "bash docker/install_python_dependencies.sh /workspace",
  "bash tools/docker_dependency_validator.sh",
  "python3 -c \"import jax; print(jax.__version__)\"",
  "python3 -c \"from iree import compiler as ireec; from iree import runtime as ireert; print(ireec.__name__); print(ireert.__name__)\"",
  "python3 tools/ci/check_jax_export_stack.py",
  "cmake -S . -B build/cpp/docker-smoke -DPROJECT_TEMPLATE_ENABLE_CPP_SMOKE=ON",
  "cmake --build build/cpp/docker-smoke --target project_template_cpp_smoke",
  "ctest --test-dir build/cpp/docker-smoke --output-on-failure",
  "safe_dirs=\"$(git config --get-all safe.directory || true)\"",
  "for safe_dir in /workspace /workspace/vendor/agent-canon; do if [ -d \"$safe_dir\" ]; then printf '%s\\n' \"$safe_dirs\" | grep -Fx \"$safe_dir\" >/dev/null; fi; done",
]

[runtime]
shell = "/bin/bash"
workdir = "/workspace"
workspace_mount = "/workspace"
env = [
  "PYTHONPATH=/workspace/python",
]

# @dependency-start
# responsibility Defines the default container pack configuration.
# upstream environment ../README.md docker runtime guidance
# upstream environment ../Dockerfile default runtime image
# @dependency-end
[pack]
name = "default"
dockerfile = "docker/Dockerfile"
context = "."
image_tag = "project-template:default-runtime-pack"

[smoke]
shell = "/bin/bash"
commands = [
  "python3 --version",
  "python3 -m pip --version",
  "cmake --version",
  "ninja --version",
  "node --version",
  "npm --version",
  "codex --version",
  "gh --version",
  "jupyter --version",
  "jupyter lab --version",
  "ssh -V",
  "docker --version",
  "dot -V",
  "bash tools/docker_dependency_validator.sh",
  "python3 tools/data/jsonl_to_md.py --help",
  "python3 tools/hlo/summarize_hlo_jsonl.py --help",
  "python3 -c \"import jax; print(jax.__version__)\"",
  "python3 -c \"from iree import compiler as ireec; from iree import runtime as ireert; print(ireec.__name__); print(ireert.__name__)\"",
  "python3 tools/ci/check_jax_export_stack.py",
  "cmake -S . -B build/cpp/docker-smoke -DPROJECT_TEMPLATE_ENABLE_CPP_SMOKE=ON",
  "cmake --build build/cpp/docker-smoke --target project_template_cpp_smoke",
  "ctest --test-dir build/cpp/docker-smoke --output-on-failure",
  "bash docker/register_safe_directories.sh /workspace",
  "safe_dirs=\"$(git config --get-all safe.directory || true)\"",
  "printf '%s\\n' \"$safe_dirs\" | grep -Fx /workspace >/dev/null",
  "if [ -d vendor ]; then for vendor_dir in vendor/*; do [ -d \"$vendor_dir\" ] || continue; printf '%s\\n' \"$safe_dirs\" | grep -Fx \"/workspace/${vendor_dir}\" >/dev/null; done; fi",
]

[runtime]
shell = "/bin/bash"
workdir = "/workspace"
workspace_mount = "/workspace"

version: 1

skill_families:
  - id: repo-onboarding
    purpose: Fast safe entry path for an unfamiliar repository or subdirectory.
    canonical_doc: agents/skills/repo-onboarding.md
    shim: .agents/skills/repo-onboarding/SKILL.md
  - id: agent-orchestration
    purpose: Choose one workflow family and align handoff, review, and runtime entrypoints.
    canonical_doc: agents/skills/agent-orchestration.md
    shim: .agents/skills/agent-orchestration/SKILL.md
  - id: artifact-placement
    purpose: Decide where task documents, reports, notes, and repo-wide canon belong.
    canonical_doc: agents/skills/artifact-placement.md
    shim: .agents/skills/artifact-placement/SKILL.md
  - id: from_another_agent
    purpose: Pull forward relevant carry-over, TODOs, and optional follow-ups from prior agent runs.
    canonical_doc: agents/skills/from_another_agent.md
    shim: .agents/skills/from_another_agent/SKILL.md
  - id: subagent-bootstrap
    purpose: Bootstrap run bundles and specialist delegation without breaking write-scope rules.
    canonical_doc: agents/skills/subagent-bootstrap.md
    shim: .agents/skills/subagent-bootstrap/SKILL.md
  - id: codex-cli
    purpose: Follow the repository-specific Codex startup path and read order.
    canonical_doc: agents/skills/codex-cli.md
    shim: .agents/skills/codex-cli/SKILL.md
  - id: codex-task-workflow
    purpose: Execute repository tasks with a context-independent Codex flow.
